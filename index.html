<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Network | Authentication</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="login-form" class="auth-box">
            <h1>AUTHENTICATE</h1>
            <p>Access your global account</p>
            <input type="text" placeholder="Username / Email">
            <input type="password" placeholder="Password">
            <button onclick="handleLogin()">LOGIN</button>
            <p class="switch">New here? <span onclick="toggleForm()">Create Account</span></p>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="auth-box" style="display:none;">
            <h1>JOIN NETWORK</h1>
            <p>Become a part of the ecosystem</p>
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Create Password">
            <button onclick="handleRegister()">SIGN UP</button>
            <p class="switch">Already a member? <span onclick="toggleForm()">Login</span></p>
        </div>
    </div>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
