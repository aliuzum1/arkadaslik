<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <title>Global Command Center | Login</title>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="login-panel">
        <div class="brand">
            <h1>GLOBAL COMMAND CENTER</h1>
            <p>Sistem Operasyonel: 700/700 Hazır</p>
        </div>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="OPERATÖR KİMLİĞİ" required>
            <input type="password" id="password" placeholder="ERİŞİM ANAHTARI" required>
        </div>
        
        <button onclick="login()" class="login-btn">SİSTEME BAĞLAN</button>
        
        <div class="status-bar">
            <span>Bağlantı: Şifreli (AES-256)</span>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
