<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Global Sosyal Ağ | Giriş & Kayıt</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <h1>GLOBAL NETWORK</h1>
            <p>İlişki & İnovasyon Ağı</p>
        </div>

        <!-- Giriş Formu -->
        <div id="login-form">
            <input type="text" placeholder="Operatör Kimliği">
            <input type="password" placeholder="Erişim Anahtarı">
            <button onclick="login()">SİSTEME BAĞLAN</button>
            <p>Henüz hesabın yok mu? <a href="#" onclick="toggleAuth()">Hemen Kayıt Ol</a></p>
        </div>

        <!-- Kayıt Formu (Başlangıçta gizli) -->
        <div id="register-form" style="display:none;">
            <input type="text" placeholder="Adın ve Soyadın">
            <input type="email" placeholder="E-posta Adresi">
            <input type="password" placeholder="Şifre Oluştur">
            <button onclick="register()">KAYIT TAMAMLA</button>
            <p>Zaten üye misin? <a href="#" onclick="toggleAuth()">Giriş Yap</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
