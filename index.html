<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkadaşlık Uygulaması - Hoş Geldin</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #a18cd1 100%); }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #5d3fd3; }
        .flower { font-size: 30px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #ff6f61; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .toggle-link { margin-top: 15px; font-size: 14px; color: #5d3fd3; cursor: pointer; text-decoration: underline; }
        #message { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="flower">🌸 🌺 🌸</div>
        <h1 id="title">Hemen Katıl!</h1>
        <p id="desc">Yeni insanlarla tanışmak için kayıt ol.</p>
        
        <input type="email" id="email" placeholder="📧 E-posta adresin">
        <input type="password" id="password" placeholder="🔐 Şifren">
        <button id="actionBtn">Kayıt Ol</button>

        <p id="toggleText" class="toggle-link">Zaten hesabın var mı? Giriş Yap</p>
        <p id="message"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDsWZcvZ0iam3VgKE2PUuFpHTkFCXRNMr4",
          authDomain: "arkadaslik-sitesi-6feb4.firebaseapp.com",
          projectId: "arkadaslik-sitesi-6feb4",
          storageBucket: "arkadaslik-sitesi-6feb4.firebasestorage.app",
          messagingSenderId: "510754120413",
          appId: "1:510754120413:web:079aeb14fe20b46b22f134",
          measurementId: "G-FB6XTD5VX0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = false; // Giriş modunda mıyız?

        // Mod Değiştirici (Kayıt <-> Giriş)
        document.getElementById("toggleText").addEventListener("click", () => {
            isLogin = !isLogin;
            document.getElementById("title").innerText = isLogin ? "Tekrar Hoş Geldin!" : "Hemen Katıl!";
            document.getElementById("desc").innerText = isLogin ? "Sohbete devam etmek için giriş yap." : "Yeni insanlarla tanışmak için kayıt ol.";
            document.getElementById("actionBtn").innerText = isLogin ? "Giriş Yap" : "Kayıt Ol";
            document.getElementById("toggleText").innerText = isLogin ? "Hesabın yok mu? Kayıt Ol" : "Zaten hesabın var mı? Giriş Yap";
        });

        // İşlem Yapıcı
        document.getElementById("actionBtn").addEventListener("click", () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const msg = document.getElementById("message");

            if(isLogin) {
                // GİRİŞ YAPMA FONKSİYONU
                signInWithEmailAndPassword(auth, email, password)
                .then(() => { msg.innerHTML = "✅ <b>Giriş Başarılı!</b> Yönlendiriliyorsun..."; })
                .catch((e) => { msg.innerText = "Hata: Bilgiler hatalı veya hesap bulunamadı."; });
            } else {
                // KAYIT OLMA FONKSİYONU
                createUserWithEmailAndPassword(auth, email, password)
                .then(() => { msg.innerHTML = "🎉 <b>Kayıt Başarılı!</b> Şimdi giriş yapabilirsin."; })
                .catch((e) => { msg.innerText = "Hata: " + e.message; });
            }
        });
    </script>
</body>
</html>
