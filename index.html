<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Girişi</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background-color: #1a1a1a; border: 1px solid #444; padding: 40px; width: 90%; max-width: 400px; text-align: center; }
        h1 { font-size: 1.2rem; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #666; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #ccc; }
    </style>
</head>
<body>

    <div class="card" id="authCard">
        <h1>SİSTEM GİRİŞİ</h1>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="password" placeholder="Şifre">
        <button id="loginBtn">GİRİŞ YAP</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDsWZcvZ0iam3VgKE2PUuFpHTkFCXRNMr4", authDomain: "arkadaslik-sitesi-6feb4.firebaseapp.com", projectId: "arkadaslik-sitesi-6feb4", storageBucket: "arkadaslik-sitesi-6feb4.firebasestorage.app", messagingSenderId: "510754120413", appId: "1:510754120413:web:079aeb14fe20b46b22f134", measurementId: "G-FB6XTD5VX0" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById("loginBtn").addEventListener("click", () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    alert("Giriş Başarılı! 1. Sayfa Tamamlandı.");
                })
                .catch(e => {
                    alert("Hata: " + e.message);
                });
        });
    </script>
</body>
</html>
